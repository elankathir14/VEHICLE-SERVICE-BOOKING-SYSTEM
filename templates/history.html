<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Your Booking History</h2>
        {% if bookings %}
            <ul class="history-list">
                {% for booking in bookings %}
                    <li>
                        <strong>{{ booking.vehicle_type }}</strong> - {{ booking.service_type }}<br>
                        Date: {{ booking.booking_date }}<br>
                        Notes: {{ booking.notes or 'No notes' }}
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No bookings yet.</p>
        {% endif %}
        <a href="{{ url_for('booking.dashboard') }}" class="btn">Back to Dashboard</a>
    </div>
</body>
</html>
